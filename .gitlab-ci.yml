stages:
  - test
  - build
  - sign
  - sync-public

# ---------------------------------------------------------------------------
# Test stage
# ---------------------------------------------------------------------------
# Per docs/TEST_PLAN.md Phase 0 we wire `go test ./...` into CI ahead of the
# image build so regressions surface before anything reaches the registry.
# `allow_failure: true` is the explicit Phase 0 stabilization posture: the
# job runs on every push, reports results to the pipeline UI, but does not
# block downstream stages. Once the legacy subprocess suite settles and
# pre-existing vet warnings are cleaned up, flip this to a hard gate.
test:
  stage: test
  # Pinned to match the GitHub Actions test job and the go directive in
  # go.mod. Bump in lockstep with that file when the toolchain upgrades.
  image: golang:1.25.8
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    # Pin Go's caches inside CI_PROJECT_DIR so the cache: directive below
    # can persist them between pipelines.
    GOPATH: $CI_PROJECT_DIR/.go
    GOCACHE: $CI_PROJECT_DIR/.gocache
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod
      - .gocache
    policy: pull-push
  script:
    - go version
    - go mod verify
    # Vet currently surfaces pre-existing warnings in tests/integration and
    # handlers/plant.go (unkeyed struct fields, unexported json tags).
    # `|| true` keeps the script going so the test step still runs; the
    # warnings remain visible in the job log.
    - go vet ./... || true
    # The legacy tests/integration suite spawns the isley binary as a
    # subprocess on port 8080. Build it here so `go test ./...` can find
    # it at the project root. Drops out once the in-process harness from
    # TEST_PLAN.md Phase 1 fully replaces the subprocess suite.
    - go build -o isley .
    - go test -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
  # Standard regex `go tool cover` emits, e.g.:
  #   total:                                                  (statements)    42.5%
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  allow_failure: true
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
    when: always

build-dev:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    # Use --digest-file to capture the exact SHA of the pushed image
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:dev"
      --digest-file=image_digest.txt
  artifacts:
    paths:
      - image_digest.txt
    expire_in: 1 hour

sign-dev:
  stage: sign
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  before_script:
    - apk add cosign
    # Login to the registry so cosign can push the signature
    - cosign login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - IMAGE_DIGEST=$(cat image_digest.txt)
    - echo "Signing image $CI_REGISTRY_IMAGE@$IMAGE_DIGEST"
    - export COSIGN_PASSWORD=$COSIGN_PASSWORD
    - cosign sign --yes --tlog-upload=false --key "$COSIGN_PRIVATE_KEY" "$CI_REGISTRY_IMAGE@$IMAGE_DIGEST"

publish_dev_to_github:
  stage: sync-public
  image: alpine:3.20
  before_script:
    - apk add git gnupg
    - gpg --batch --import "$GPG_PRIVATE_KEY"
    # SANITY CHECK: This MUST show 'sec' in the job logs
    - gpg --list-secret-keys
    - git config --global user.email "68145+dwot@users.noreply.github.com"
    - git config --global user.name "isley-ci-sync"
    - git config --global user.signingkey "$GPG_KEY_ID"
    - git config --global commit.gpgsign true
  script:
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/dwot/isley.git
    - git fetch github dev
    - git checkout -B sync-branch github/dev
    - git merge --squash $CI_COMMIT_SHA
    # Signed squash-sync. Embed the originating GitLab short SHA so published
    # Docker Hub images (which are tagged with the post-squash GitHub SHA)
    # can be traced back to the internal commit that triggered them.
    - git commit -S -m "Dev Update $(date -u +'%Y-%m-%d') [Signed Sync] from gitlab@${CI_COMMIT_SHORT_SHA}"
    # Explicitly push the local sync-branch to the remote dev branch
    - git push github sync-branch:dev --force
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: manual