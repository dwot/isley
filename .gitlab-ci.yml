stages:
  - test
  - build
  - sign
  - sync-public

# ---------------------------------------------------------------------------
# Test stage
# ---------------------------------------------------------------------------
# Per docs/TEST_PLAN.md Phases 0 and 5: `go test ./...` runs ahead of the
# image build so regressions surface before anything reaches the registry.
# The legacy subprocess suite was retired in Phase 5, so this job now runs
# fully in-process via tests/testutil + httptest — no port 8080, no
# pre-built binary required.
test:
  stage: test
  # Pinned to match the GitHub Actions test job and the go directive in
  # go.mod. Bump in lockstep with that file when the toolchain upgrades.
  image: golang:1.25.8
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    # Pin Go's caches inside CI_PROJECT_DIR so the cache: directive below
    # can persist them between pipelines.
    GOPATH: $CI_PROJECT_DIR/.go
    GOCACHE: $CI_PROJECT_DIR/.gocache
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod
      - .gocache
    policy: pull-push
  script:
    - go version
    - go mod verify
    - go vet ./...
    # Phase 6c: -coverpkg=./... credits cross-package coverage so that
    # integration tests boot via app.NewEngine — and the handler/model
    # code they exercise — count toward the totals.
    # -timeout=20m: race detector + full-tree instrumentation slows each
    # package ~2.5-3x; handlers/ and tests/integration/ no longer fit in
    # Go's default 10m per-package timeout.
    - go test -race -coverpkg=./... -coverprofile=coverage.out -timeout=20m ./...
    - go tool cover -func=coverage.out | tail -1
    # docs/TEST_PLAN_2.md Phase 1: gate on a documented coverage floor so
    # PRs that drop the bar fail review at CI time, not in a follow-up
    # audit. Floor was set to floor(total - 1.0) where total was the
    # `go tool cover` reading on the dev branch when this gate landed.
    # Bump the floor in PRs that earn it; never lower it (see
    # CONTRIBUTING.md "Coverage floor"). Mirrors the GitHub job in
    # `.github/workflows/release.yml`.
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
      floor=55.0
      awk -v t="$total" -v f="$floor" 'BEGIN { exit !(t+0 >= f+0) }' \
        || { echo "coverage $total% < floor $floor%" >&2; exit 1; }
      echo "coverage $total% >= floor $floor%"
  # Standard regex `go tool cover` emits, e.g.:
  #   total:                                                  (statements)    42.5%
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
    when: always

# docs/TEST_PLAN.md Phase 5: every dialect-branching path runs against
# real PostgreSQL on every PR. Without this matrix the project's second
# supported backend has only ever been exercised against a SetDriverForTesting
# flag, not a real server. Lives in the same `test` stage as the SQLite
# job so the `build` stage gates on both automatically.
test-postgres:
  stage: test
  image: golang:1.25.8
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_PASSWORD: test
    POSTGRES_DB: postgres
    GOPATH: $CI_PROJECT_DIR/.go
    GOCACHE: $CI_PROJECT_DIR/.gocache
    ISLEY_TEST_DB_HOST: postgres
    ISLEY_TEST_DB_PORT: '5432'
    ISLEY_TEST_DB_USER: postgres
    ISLEY_TEST_DB_PASSWORD: test
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go/pkg/mod
      - .gocache
    policy: pull-push
  script:
    - go version
    # `-run Postgres` keeps the SQLite-only tests in tests/integration
    # out of the test binary's run set: under the integration_postgres
    # tag both kinds of tests compile in, but they share the
    # model.dbDriver global via SetDriverForTesting. Filtering by name
    # is the contract that lets them coexist in one package.
    - go test -race -tags=integration_postgres -coverpkg=./... -coverprofile=coverage-postgres.out -run Postgres -timeout=20m ./tests/integration/... ./model/...
    - go tool cover -func=coverage-postgres.out | tail -1
    # docs/TEST_PLAN_2.md Phase 1: this floor reflects today's `test-postgres`
    # job which only exercises smoke + migrations + sqlite_to_postgres
    # (a small fraction of the codebase). Phase 7 lifts dialect-branched
    # handler tests into this job; raise the floor at that point. Bump on
    # earn, never lower (see CONTRIBUTING.md "Coverage floor").
    - |
      total=$(go tool cover -func=coverage-postgres.out | awk '/^total:/ {gsub("%","",$3); print $3}')
      floor=2.0
      awk -v t="$total" -v f="$floor" 'BEGIN { exit !(t+0 >= f+0) }' \
        || { echo "postgres coverage $total% < floor $floor%" >&2; exit 1; }
      echo "postgres coverage $total% >= floor $floor%"
  artifacts:
    paths:
      - coverage-postgres.out
    expire_in: 1 week
    when: always

build-dev:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    # Use --digest-file to capture the exact SHA of the pushed image
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:dev"
      --digest-file=image_digest.txt
  artifacts:
    paths:
      - image_digest.txt
    expire_in: 1 hour

sign-dev:
  stage: sign
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  before_script:
    - apk add cosign
    # Login to the registry so cosign can push the signature
    - cosign login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - IMAGE_DIGEST=$(cat image_digest.txt)
    - echo "Signing image $CI_REGISTRY_IMAGE@$IMAGE_DIGEST"
    - export COSIGN_PASSWORD=$COSIGN_PASSWORD
    - cosign sign --yes --tlog-upload=false --key "$COSIGN_PRIVATE_KEY" "$CI_REGISTRY_IMAGE@$IMAGE_DIGEST"

publish_dev_to_github:
  stage: sync-public
  image: alpine:3.20
  before_script:
    - apk add git gnupg
    - gpg --batch --import "$GPG_PRIVATE_KEY"
    # SANITY CHECK: This MUST show 'sec' in the job logs
    - gpg --list-secret-keys
    - git config --global user.email "68145+dwot@users.noreply.github.com"
    - git config --global user.name "isley-ci-sync"
    - git config --global user.signingkey "$GPG_KEY_ID"
    - git config --global commit.gpgsign true
  script:
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/dwot/isley.git
    - git fetch github dev
    - git checkout -B sync-branch github/dev
    - git merge --squash $CI_COMMIT_SHA
    # Signed squash-sync. Embed the originating GitLab short SHA so published
    # Docker Hub images (which are tagged with the post-squash GitHub SHA)
    # can be traced back to the internal commit that triggered them.
    - git commit -S -m "Dev Update $(date -u +'%Y-%m-%d') [Signed Sync] from gitlab@${CI_COMMIT_SHORT_SHA}"
    # Explicitly push the local sync-branch to the remote dev branch
    - git push github sync-branch:dev --force
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: manual