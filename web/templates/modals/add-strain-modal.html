{{ define "modals/add-strain-modal.html" }}
<!-- Add Strain Modal -->
<div class="modal fade" id="addStrainModal" tabindex="-1" aria-labelledby="addStrainModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addStrainModalLabel">{{ .lcl.add_new_strain }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ .lcl.title_close }}"></button>
            </div>
            <div class="modal-body">
                <form id="addStrainForm">
                    <!-- Strain Name -->
                    <div class="mb-3">
                        <label for="strainName" class="form-label required">{{ .lcl.strain_name }}</label>
                        <input type="text" class="form-control" id="strainName" placeholder="{{ .lcl.strain_name_placeholder }}" required>
                    </div>

                    <!-- URL -->
                    <div class="mb-3">
                        <label for="url" class="form-label">{{ .lcl.url }}</label>
                        <input type="text" class="form-control" id="url" placeholder="{{ .lcl.strain_url_placeholder }}" >
                    </div>

                    <!-- Breeder Dropdown -->
                    <div class="mb-3">
                        <label for="breederSelect" class="form-label required">{{ .lcl.breeder }}</label>
                        <select class="form-select" id="breederSelect" required>
                            {{ range .breeders }}
                            <option value="{{ .ID }}">{{ .Name }}</option>
                            {{ end }}
                            <option value="new">Add New Breeder</option>
                        </select>
                    </div>

                    <!-- New Breeder Input -->
                    <div class="mb-3 d-none" id="newBreederInput">
                        <label for="newBreederName" class="form-label">{{ .lcl.add_new_breeder }}</label>
                        <input type="text" class="form-control" id="newBreederName" placeholder="{{ .lcl.new_breeder_placeholder }}">
                    </div>

                    <!-- Indica / Sativa / Ruderalis Multi-Thumb Slider -->
                    <div class="mb-3">
                        <label class="form-label">{{ .lcl.i_s_ratio }}</label>
                        <input type="hidden" id="indicaInput" value="50">
                        <input type="hidden" id="sativaInput" value="50">
                        <input type="hidden" id="ruderalisInput" value="0">

                        <div class="strain-genetics-slider mb-2" id="geneticsSlider">
                            <div class="strain-ratio-bar-tri" role="img" aria-label="Genetics ratio">
                                <div class="strain-ratio-indica" id="ratioFillIndica" style="width: 50%"></div>
                                <div class="strain-ratio-sativa" id="ratioFillSativa" style="width: 50%"></div>
                                <div class="strain-ratio-ruderalis" id="ratioFillRuderalis" style="width: 0%"></div>
                            </div>
                            <input type="range" class="strain-genetics-thumb strain-genetics-thumb-lower" id="geneticsLower" min="0" max="100" value="50" step="1" aria-label="Indica boundary">
                            <input type="range" class="strain-genetics-thumb strain-genetics-thumb-upper" id="geneticsUpper" min="0" max="100" value="100" step="1" aria-label="Sativa boundary">
                        </div>

                        <div class="d-flex justify-content-between">
                            <small class="fw-semibold strain-indica-text" id="indicaLabel">Indica: 50%</small>
                            <small class="fw-semibold strain-sativa-text" id="sativaLabel">Sativa: 50%</small>
                            <small class="fw-semibold strain-ruderalis-text" id="ruderalisLabel">Ruderalis: 0%</small>
                        </div>
                        <small class="text-danger d-none" id="ratioError">{{ .lcl.genetics_must_sum_100 }}</small>
                    </div>

                    <!-- Autoflower -->
                    <div class="mb-3">
                        <label for="autoflower" class="form-label required">{{ .lcl.autoflower }}</label>
                        <select class="form-select" id="autoflower" required>
                            <option value="true">{{ .lcl.yes }}</option>
                            <option value="false" selected>{{ .lcl.no }}</option>
                        </select>
                    </div>

                    <!-- Cycle Time -->
                    <div class="mb-3">
                        <label for="cycleTime" class="form-label required">{{ .lcl.cycle_time }}</label>
                        <input type="number" class="form-control" id="cycleTime" min="0" placeholder="days" required value="56">
                        <p class="text-muted">{{ .lcl.cycle_time_desc }}</p>
                    </div>

                    <!-- Seed Count -->
                    <div class="mb-3">
                        <label for="seedCount" class="form-label required">{{ .lcl.seed_count }}</label>
                        <input type="number" class="form-control" id="seedCount" min="0" placeholder="{{ .lcl.seed_count_placeholder }}" required>
                    </div>

                    <!-- Short Description -->
                    <div class="mb-3">
                        <label for="strainShortDescription" class="form-label required">{{ .lcl.short_description_txt }}</label>
                        <input type="text" class="form-control" id="strainShortDescription" placeholder="{{ .lcl.short_description_placeholder }}" required>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="strainDescription" class="form-label">{{ .lcl.description_txt }}</label>
                        <textarea class="form-control" id="strainDescription" rows="3" placeholder="{{ .lcl.strain_description_placeholder }}"></textarea>
                        <p class="text-muted">{{ .lcl.description_txt_desc }}</p>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary"><span class="spinner-border spinner-border-sm btn-spinner" role="status" aria-hidden="true"></span> {{ .lcl.add_strain }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/add-strain-modal.js"></script>
{{ end }}
