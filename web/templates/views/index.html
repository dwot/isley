{{ define "views/index.html"}}
<!--index.html - Dashboard-->

{{ template "common/header.html" .}}
<script src="https://cdn.jsdelivr.net/npm/video.js@8.21.0/dist/video.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.21.0/dist/video-js.min.css">
{{ template "common/header2.html" .}}

<div class="container" data-poll-interval="{{ .pollInterval }}">
    <h1 class="visually-hidden">{{ .lcl.title_dashboard }}</h1>

    <!-- Summary Bar -->
    <div id="dashSummary" class="dash-summary"></div>

    <!-- Zone Sections -->
    <div id="dashZones"></div>

    <!-- Empty state -->
    <div id="dashEmpty" class="dash-empty" style="display:none;">
        <i class="fa-solid fa-seedling"></i>
        <p>{{ .lcl.no_plants_yet }}</p>
    </div>
</div>

<script src="/static/js/main.js"></script>

<!--Embed the footer.html template at this location-->
{{ template "common/footer.html" .}}

{{ end }}
