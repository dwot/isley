version: '3.8'

services:
  isley:
    image: dwot/isley:${ISLEY_VERSION:-latest}
    ports:
      - "8080:8080"
    environment:
      - ISLEY_PORT=8080
      - ISLEY_DB_DRIVER=sqlite
      - ISLEY_SESSION_SECRET=${ISLEY_SESSION_SECRET:-}
    volumes:
      - isley-db:/app/data
      - isley-uploads:/app/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  isley-db:
  isley-uploads:
