name: Build and Release

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build and Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch full history and tags so git describe and tag pushes work correctly
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Verify Go Modules
        run: go mod verify

      - name: Check Translation Keys
        run: |
          # Run i18n_sync in dry-run mode; if any output is produced, keys are missing
          output=$(go run ./scripts/i18n_sync.go -path=utils/locales 2>&1)
          if [ -n "$output" ]; then
            echo "$output"
            echo "::error::Translation keys are out of sync. Run: go run ./scripts/i18n_sync.go -path=utils/locales -apply"
            exit 1
          fi

      - name: Set Version
        id: version
        run: |
          # On main use the VERSION file (fail if missing); on other branches, use 'dev'
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if [ -f VERSION ]; then
              echo "version=$(cat VERSION)" >> $GITHUB_ENV
            else
              echo "VERSION file is missing on main branch" >&2
              exit 1
            fi
          else
            echo "version=dev" >> $GITHUB_ENV
          fi

      - name: Print Version
        run: echo "Building version ${{ env.version }}"

      - name: Build Linux Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-w -s -X main.version=${{ env.version }}" -o isley-linux

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker Tags
        id: docker_tags
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tags=dwot/isley:${{ env.version }},dwot/isley:latest" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::8}
            echo "tags=dwot/isley:dev,dwot/isley:dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Multi-Platform Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker Image for Vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: dwot/isley:${{ env.version == 'dev' && 'dev' || env.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Generate Release Notes
        run: |
          release_date=$(date -u +"%Y-%m-%d")

          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            last_tag=$(git describe --tags --abbrev=0)
            commit_range="$last_tag..HEAD"
          else
            commit_range="HEAD"
          fi

          changes=""
          deps=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            case "$msg" in
              "Merge remote-tracking branch"*) continue ;;
              "Merge branch 'refs/heads/dependabot/"*) continue ;;
              "Increment version"*) continue ;;
            esac
            if echo "$msg" | grep -qE '^Bump .+ from .+ to .+'; then
              pkg=$(echo "$msg" | sed -E 's/^Bump (.+) from (.+) to (.+)$/\1: \2 → \3/')
              deps="${deps}- ${pkg}\n"
            else
              changes="${changes}- ${msg}\n"
            fi
          done < <(git log --pretty=format:"%s" $commit_range)

          {
            echo "## Release Notes — $release_date"
            echo ""
            if [ -n "$changes" ]; then
              echo "## What's Changed"
              echo ""
              printf "%b" "$changes"
              echo ""
            fi
            if [ -n "$deps" ]; then
              echo "## Dependency Updates"
              echo ""
              printf "%b" "$deps"
            fi
          } > release_notes.md

      - name: Create and push tag (Main Branch Only)
        if: github.ref == 'refs/heads/main'
        run: |
          TAG="v${{ env.version }}"
          # If tag exists, skip creating it. Otherwise create annotated tag and push.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Release Artifacts (Main Branch Only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: v${{ env.version }}
          name: Release v${{ env.version }}
          body_path: release_notes.md
          files: |
            isley-linux

      - name: Cleanup Release Notes
        run: rm -f release_notes.md
